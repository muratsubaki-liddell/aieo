<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="s3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EBF3FF"/>
      <stop offset="100%" stop-color="#DAF0FF"/>
    </linearGradient>
    <linearGradient id="s3bl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F7EFF"/>
      <stop offset="100%" stop-color="#00C4FF"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#s3bg)"/>

  <!-- ===== TOP: Person icon — no background, blue, larger than stage icons ===== -->
  <!-- margin-top 3x: top of head at y=24 (original ~8px × 3) -->
  <!-- scale=1.6 → icon ~38px, translate(141,19) centers at x=160 -->
  <g transform="translate(141, 19) scale(1.6)" fill="none" stroke="#2F7EFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="7" r="4"/>
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </g>

  <!-- ===== STAGE CIRCLES (r=26, cy=100, cx=40/120/200/280) ===== -->

  <!-- Forward arrows: each is ONE polygon object (line body + arrowhead unified, no overlap) -->
  <!-- Arrow 1 → (x=70→90, 4px gap each side) -->
  <polygon points="70,99 82,99 82,96 90,100 82,104 82,101 70,101" fill="#2F7EFF" opacity="0.65"/>
  <!-- Arrow 2 → (x=150→170, 4px gap each side) -->
  <polygon points="150,99 162,99 162,96 170,100 162,104 162,101 150,101" fill="#2F7EFF" opacity="0.65"/>
  <!-- Arrow 3 → (x=230→250, 4px gap each side) -->
  <polygon points="230,99 242,99 242,96 250,100 242,104 242,101 230,101" fill="#2F7EFF" opacity="0.65"/>

  <!-- Circle 1: 診断 -->
  <circle cx="40" cy="100" r="26" fill="url(#s3bl)"/>
  <circle cx="40" cy="100" r="26" fill="white" opacity="0.12"/>
  <circle cx="37" cy="96" r="9" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="44" y1="103" x2="50" y2="109" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Circle 2: 実行 -->
  <circle cx="120" cy="100" r="26" fill="url(#s3bl)"/>
  <circle cx="120" cy="100" r="26" fill="white" opacity="0.12"/>
  <polygon points="124,87 113,101 120,101 116,113 127,99 120,99" fill="white"/>

  <!-- Circle 3: 効果測定 -->
  <circle cx="200" cy="100" r="26" fill="url(#s3bl)"/>
  <circle cx="200" cy="100" r="26" fill="white" opacity="0.12"/>
  <rect x="189" y="104" width="6" height="10" rx="1.5" fill="white"/>
  <rect x="198" y="93" width="6" height="21" rx="1.5" fill="white"/>
  <rect x="207" y="98" width="6" height="16" rx="1.5" fill="white"/>
  <line x1="187" y1="114" x2="215" y2="114" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Circle 4: 改善/PDCA -->
  <circle cx="280" cy="100" r="26" fill="url(#s3bl)"/>
  <circle cx="280" cy="100" r="26" fill="white" opacity="0.12"/>
  <path d="M280 86 A14 14 0 0 1 294 100" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M294 100 A14 14 0 0 1 280 114" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M280 114 A14 14 0 0 1 266 100" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
  <path d="M266 100 A14 14 0 0 1 280 86" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
  <polygon points="280,84 275,91 285,91" fill="white"/>

  <!-- Labels (#2F7EFF — same as SVG 2) -->
  <text x="40" y="142" text-anchor="middle" fill="#2F7EFF" font-size="13" font-weight="700" font-family="system-ui,sans-serif">診断</text>
  <text x="120" y="142" text-anchor="middle" fill="#2F7EFF" font-size="13" font-weight="700" font-family="system-ui,sans-serif">実行</text>
  <text x="200" y="142" text-anchor="middle" fill="#2F7EFF" font-size="13" font-weight="700" font-family="system-ui,sans-serif">効果測定</text>
  <text x="280" y="142" text-anchor="middle" fill="#2F7EFF" font-size="13" font-weight="700" font-family="system-ui,sans-serif">改善</text>

  <!-- Return arc arrow: right→left, Q bezier arc -->
  <!-- Q(278,150, 160,196, 42,150): tangent at end = 2*(42-160, 150-196) = (-236,-92) -->
  <!-- Arrowhead aligned to tangent direction (-0.932,-0.364): -->
  <!--   tip=(42,150), base_center=(51,154), wings=(53,149) and (49,159) -->
  <g opacity="0.58">
    <path d="M278 150 Q160 196 42 150" stroke="#2F7EFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <polygon points="42,150 53,149 49,159" fill="#2F7EFF"/>
  </g>
</svg>
