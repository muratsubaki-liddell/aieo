<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="s1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EBF3FF"/>
      <stop offset="100%" stop-color="#DAF0FF"/>
    </linearGradient>
    <linearGradient id="s1bl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F7EFF"/>
      <stop offset="100%" stop-color="#00C4FF"/>
    </linearGradient>
    <linearGradient id="s1nd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A6EEE"/>
      <stop offset="100%" stop-color="#00B5EE"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#s1bg)"/>
  <ellipse cx="160" cy="100" rx="80" ry="55" fill="#2F7EFF" opacity="0.05"/>

  <!-- ===== LEFT GROUP: Neural Network (x=12~100) ===== -->
  <!-- input→hidden lines -->
  <line x1="24" y1="75" x2="56" y2="60" stroke="#2F7EFF" stroke-width="1.5" opacity="0.30"/>
  <line x1="24" y1="75" x2="56" y2="100" stroke="#2F7EFF" stroke-width="1.5" opacity="0.30"/>
  <line x1="24" y1="75" x2="56" y2="140" stroke="#2F7EFF" stroke-width="1.5" opacity="0.15"/>
  <line x1="24" y1="125" x2="56" y2="60" stroke="#2F7EFF" stroke-width="1.5" opacity="0.15"/>
  <line x1="24" y1="125" x2="56" y2="100" stroke="#2F7EFF" stroke-width="1.5" opacity="0.30"/>
  <line x1="24" y1="125" x2="56" y2="140" stroke="#2F7EFF" stroke-width="1.5" opacity="0.30"/>
  <!-- hidden→output lines -->
  <line x1="56" y1="60" x2="88" y2="80" stroke="#2F7EFF" stroke-width="1.5" opacity="0.35"/>
  <line x1="56" y1="60" x2="88" y2="120" stroke="#2F7EFF" stroke-width="1.5" opacity="0.15"/>
  <line x1="56" y1="100" x2="88" y2="80" stroke="#2F7EFF" stroke-width="1.5" opacity="0.30"/>
  <line x1="56" y1="100" x2="88" y2="120" stroke="#2F7EFF" stroke-width="1.5" opacity="0.30"/>
  <line x1="56" y1="140" x2="88" y2="80" stroke="#2F7EFF" stroke-width="1.5" opacity="0.15"/>
  <line x1="56" y1="140" x2="88" y2="120" stroke="#2F7EFF" stroke-width="1.5" opacity="0.35"/>
  <!-- input nodes -->
  <circle cx="24" cy="75" r="12" fill="white" stroke="#2F7EFF" stroke-width="2"/>
  <circle cx="24" cy="75" r="4.5" fill="url(#s1bl)" opacity="0.7"/>
  <circle cx="24" cy="125" r="12" fill="white" stroke="#2F7EFF" stroke-width="2"/>
  <circle cx="24" cy="125" r="4.5" fill="url(#s1bl)" opacity="0.7"/>
  <!-- hidden nodes -->
  <circle cx="56" cy="60" r="13" fill="url(#s1nd)"/>
  <circle cx="56" cy="60" r="5" fill="white" opacity="0.35"/>
  <circle cx="56" cy="100" r="15" fill="url(#s1bl)"/>
  <circle cx="56" cy="100" r="6" fill="white" opacity="0.30"/>
  <circle cx="56" cy="140" r="13" fill="url(#s1nd)"/>
  <circle cx="56" cy="140" r="5" fill="white" opacity="0.35"/>
  <!-- output nodes -->
  <circle cx="88" cy="80" r="12" fill="url(#s1bl)" opacity="0.85"/>
  <circle cx="88" cy="120" r="12" fill="url(#s1bl)" opacity="0.85"/>

  <!-- Bridge: left group → center (gap x=100~118, 22px) -->
  <line x1="100" y1="84" x2="118" y2="93" stroke="#2F7EFF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.40"/>
  <line x1="100" y1="116" x2="118" y2="107" stroke="#2F7EFF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.40"/>

  <!-- ===== CENTER: Fusion circle (cx=160, cy=100, r=42, gap both sides = 22px) ===== -->
  <circle cx="160" cy="100" r="42" fill="url(#s1bl)"/>
  <circle cx="160" cy="100" r="42" fill="white" opacity="0.08"/>
  <text x="160" y="96" text-anchor="middle" fill="white" font-size="18" font-weight="700" font-family="system-ui,sans-serif">AI</text>
  <text x="160" y="116" text-anchor="middle" fill="white" font-size="18" font-weight="700" font-family="system-ui,sans-serif">SEO</text>

  <!-- Bridge: center → right group (gap x=202~224, 22px) -->
  <line x1="202" y1="93" x2="224" y2="78" stroke="#2F7EFF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.40"/>
  <line x1="202" y1="107" x2="224" y2="122" stroke="#2F7EFF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.40"/>

  <!-- ===== RIGHT GROUP: SEO results (x=224~312) ===== -->
  <!-- Card 1 (top rank) -->
  <rect x="224" y="50" width="88" height="27" rx="6" fill="white" stroke="#2F7EFF" stroke-width="2"/>
  <rect x="224" y="50" width="20" height="27" rx="5" fill="url(#s1bl)"/>
  <rect x="236" y="50" width="8" height="27" fill="url(#s1bl)"/>
  <rect x="250" y="59" width="42" height="4" rx="2" fill="#CBD8F0"/>
  <rect x="250" y="67" width="28" height="3" rx="1.5" fill="#EBF3FF"/>
  <circle cx="301" cy="63" r="5" fill="#FFD700" opacity="0.8"/>
  <!-- Card 2 -->
  <rect x="224" y="83" width="88" height="22" rx="5" fill="white" stroke="#D0DFFA" stroke-width="1.5"/>
  <rect x="224" y="83" width="20" height="22" rx="5" fill="#EBF3FF"/>
  <rect x="236" y="83" width="8" height="22" fill="#EBF3FF"/>
  <rect x="250" y="91" width="48" height="3.5" rx="1.5" fill="#E2E8F4"/>
  <rect x="250" y="98" width="32" height="3" rx="1.5" fill="#F0F5FF"/>
  <!-- Card 3 -->
  <rect x="224" y="111" width="88" height="22" rx="5" fill="white" stroke="#D0DFFA" stroke-width="1.5"/>
  <rect x="224" y="111" width="20" height="22" rx="5" fill="#EBF3FF"/>
  <rect x="236" y="111" width="8" height="22" fill="#EBF3FF"/>
  <rect x="250" y="119" width="38" height="3.5" rx="1.5" fill="#E2E8F4"/>
  <rect x="250" y="126" width="48" height="3" rx="1.5" fill="#F0F5FF"/>
  <!-- Card 4 -->
  <rect x="224" y="139" width="88" height="20" rx="5" fill="white" stroke="#E8EEFA" stroke-width="1"/>
  <rect x="224" y="139" width="20" height="20" rx="5" fill="#F4F7FC"/>
  <rect x="236" y="139" width="8" height="20" fill="#F4F7FC"/>
  <rect x="250" y="147" width="44" height="3.5" rx="1.5" fill="#EEF2F9"/>
  <rect x="250" y="154" width="30" height="3" rx="1.5" fill="#F4F7FC"/>
</svg>
