<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="s2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EBF3FF"/>
      <stop offset="100%" stop-color="#DAF0FF"/>
    </linearGradient>
    <linearGradient id="s2bl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2F7EFF"/>
      <stop offset="100%" stop-color="#00C4FF"/>
    </linearGradient>
    <linearGradient id="s2cn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A6EFF"/>
      <stop offset="100%" stop-color="#00B5EE"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#s2bg)"/>

  <!-- Shift all content down 4px for vertical centering (top≈24px, bottom≈24px) -->
  <g transform="translate(0,4)">

    <!-- ===== LEFT PANEL: AIEO Diagnostic Score (x=16~152, y=20~148) ===== -->
    <rect x="16" y="20" width="136" height="128" rx="10" fill="white" opacity="0.88"/>
    <rect x="16" y="20" width="136" height="8" rx="5" fill="url(#s2bl)"/>
    <rect x="16" y="24" width="136" height="4" fill="url(#s2bl)"/>

    <!-- Mini chart icon -->
    <rect x="30" y="38" width="5" height="13" rx="2" fill="#2F7EFF" opacity="0.30"/>
    <rect x="39" y="33" width="5" height="18" rx="2" fill="#2F7EFF" opacity="0.50"/>
    <rect x="48" y="36" width="5" height="15" rx="2" fill="#2F7EFF" opacity="0.40"/>
    <line x1="28" y1="52" x2="55" y2="52" stroke="#CBD8F0" stroke-width="1"/>

    <!-- 5 bar rows -->
    <circle cx="28" cy="68" r="5" fill="url(#s2bl)"/>
    <rect x="40" y="64" width="96" height="8" rx="4" fill="#EBF3FF"/>
    <rect x="40" y="64" width="76" height="8" rx="4" fill="url(#s2bl)"/>

    <circle cx="28" cy="84" r="5" fill="#00C4FF" opacity="0.8"/>
    <rect x="40" y="80" width="96" height="8" rx="4" fill="#EBF3FF"/>
    <rect x="40" y="80" width="54" height="8" rx="4" fill="url(#s2cn)"/>

    <circle cx="28" cy="100" r="5" fill="url(#s2bl)"/>
    <rect x="40" y="96" width="96" height="8" rx="4" fill="#EBF3FF"/>
    <rect x="40" y="96" width="82" height="8" rx="4" fill="url(#s2bl)"/>

    <circle cx="28" cy="116" r="5" fill="#00C4FF" opacity="0.8"/>
    <rect x="40" y="112" width="96" height="8" rx="4" fill="#EBF3FF"/>
    <rect x="40" y="112" width="42" height="8" rx="4" fill="url(#s2cn)"/>

    <circle cx="28" cy="132" r="5" fill="url(#s2bl)" opacity="0.60"/>
    <rect x="40" y="128" width="96" height="8" rx="4" fill="#EBF3FF"/>
    <rect x="40" y="128" width="66" height="8" rx="4" fill="url(#s2bl)" opacity="0.70"/>

    <!-- Left panel label -->
    <text x="84" y="168" text-anchor="middle" fill="#2F7EFF" font-size="13" font-weight="700" font-family="system-ui,sans-serif">AIEO診断スコア</text>

    <!-- ===== RIGHT PANEL: Priority Matrix (x=168~304, y=20~148) ===== -->
    <rect x="168" y="20" width="136" height="128" rx="10" fill="white" opacity="0.88"/>
    <rect x="168" y="20" width="136" height="8" rx="5" fill="url(#s2bl)"/>
    <rect x="168" y="24" width="136" height="4" fill="url(#s2bl)"/>

    <!-- Axes -->
    <line x1="182" y1="36" x2="182" y2="140" stroke="#CBD8F0" stroke-width="1.5"/>
    <line x1="182" y1="140" x2="296" y2="140" stroke="#CBD8F0" stroke-width="1.5"/>
    <polygon points="182,33 178,41 186,41" fill="#CBD8F0"/>
    <polygon points="299,140 291,136 291,144" fill="#CBD8F0"/>
    <line x1="239" y1="36" x2="239" y2="140" stroke="#E8F0FE" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="182" y1="88" x2="296" y2="88" stroke="#E8F0FE" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Priority zone highlight -->
    <rect x="183" y="37" width="55" height="50" rx="4" fill="#2F7EFF" opacity="0.06"/>

    <!-- Data dots -->
    <circle cx="204" cy="56" r="13" fill="url(#s2bl)" opacity="0.95"/>
    <circle cx="222" cy="71" r="9" fill="#2F7EFF" opacity="0.70"/>
    <circle cx="198" cy="74" r="7" fill="#00C4FF" opacity="0.80"/>
    <circle cx="204" cy="56" r="18" fill="none" stroke="#2F7EFF" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.45"/>

    <circle cx="260" cy="55" r="10" fill="#2F7EFF" opacity="0.45"/>
    <circle cx="278" cy="72" r="7" fill="#00C4FF" opacity="0.35"/>

    <circle cx="198" cy="112" r="8" fill="#CBD8F0"/>
    <circle cx="214" cy="126" r="6" fill="#CBD8F0" opacity="0.70"/>
    <circle cx="260" cy="118" r="7" fill="#CBD8F0" opacity="0.80"/>
    <circle cx="274" cy="104" r="5" fill="#CBD8F0" opacity="0.60"/>

    <!-- Right panel label -->
    <text x="236" y="168" text-anchor="middle" fill="#2F7EFF" font-size="13" font-weight="700" font-family="system-ui,sans-serif">優先度マトリクス</text>

  </g>
</svg>
